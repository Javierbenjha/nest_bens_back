name: Deploy NestJS to Azure App Service

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare deployment package
        run: |
          mkdir -p deploy_pkg
          cp -r dist deploy_pkg/
          cp -r node_modules deploy_pkg/
          cp -r prisma deploy_pkg/
          cp package.json deploy_pkg/
          cp package-lock.json deploy_pkg/
          echo '[config]' > deploy_pkg/.deployment
          echo 'command = echo skip' >> deploy_pkg/.deployment
          cd deploy_pkg && zip -r ../deploy.zip . && cd ..

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: tesis-back-benj2024
          package: deploy.zip
