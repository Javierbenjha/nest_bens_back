name: Deploy NestJS to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment zip
        run: zip -r deploy.zip dist node_modules package.json prisma

      - name: Deploy to Azure
        run: az webapp deploy --name tesis-back-benj2024 --resource-group tesis-rg --src-path deploy.zip --type zip
